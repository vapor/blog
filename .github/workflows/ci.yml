name: PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-deploy:
    name: Lint, Build, and Deploy
    runs-on: ubuntu-latest
    permissions: { id-token: write, deployments: write, contents: read }
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install latesst Swift
        uses: vapor/swiftly-action@bedb227456c5f495afbef80baebee17a8a02cef4 # v0.2.1
        with:
          toolchain: latest
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup CloudFormation linter
        uses: ScottBrenner/cfn-lint-action@ed184e91f5085a2932501da8314e899e5e0ef5be # v2.7.1
      - name: Run CloudFormation linter
        run: cfn-lint -t stack.yaml
      - name: Build site
        run: |
          set -o pipefail
          swift run 2>&1 | tee build.log
      - name: Check for broken links and post front-matter warnings
        run: |
          if grep -nE '\[kiln\] (link check|blog:)' build.log; then
            echo "::error::Kiln reported broken internal links/images or post front-matter problems (missing/unparseable date, unknown author) — see the matched lines above."
            exit 1
          fi
          echo "No broken links or front-matter warnings."
      - name: Validate generated sitemap and feed
        run: |
          python3 - <<'PY'
          import sys, xml.dom.minidom
          ok = True
          for path in ("site/sitemap.xml", "site/feed.rss"):
              try:
                  xml.dom.minidom.parse(path)
                  print(f"{path}: well-formed XML")
              except Exception as error:
                  print(f"::error::{path}: {error}")
                  ok = False
          sys.exit(0 if ok else 1)
          PY
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
          aws-region: ${{ vars.OIDC_ROLE_REGION }}
      - name: Deploy S3 Website
        if: ${{ github.event.pull_request.head.repo.full_name == 'vapor/blog' && github.actor != 'dependabot[bot]' }}
        uses: brokenhandsio/s3-website-pr-action@9461e5d13f1c56290b8a006546dd5e845ef2c671 # v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          bucket-prefix: "vapor-blog-pulls"
          folder-to-copy: "./site"
          bucket-region: "us-east-1"
