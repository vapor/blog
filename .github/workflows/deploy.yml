name: Build and deploy blog.vapor.codes
on:
  push:
    branches:
    - main

jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install latest Swift
        uses: vapor/swiftly-action@bedb227456c5f495afbef80baebee17a8a02cef4 # v0.2.1
        with:
          toolchain: latest
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build site
        run: swift run
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
          aws-region: ${{ vars.OIDC_ROLE_REGION }}
      # The `vapor-blog-stack` CloudFormation stack is deployed automatically via
      # CloudFormation Git sync (CodeConnections) when `stack.yaml` changes on main
      # — so this workflow only ships content. Don't add a `cloudformation deploy`
      # step here: it races the Git sync and fails with "stack is UPDATE_IN_PROGRESS".
      - name: Deploy Site to S3
        run: |
          # Python's mimetypes package now correctly detects the application/rss+xml MIME type for feed.rss, so don't need to handle it separately anymore
          aws s3 sync ./site 's3://${{ vars.VAPOR_BLOG_BUCKET_NAME }}/' --no-progress --acl public-read --follow-symlinks --delete
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id '${{ secrets.VAPOR_BLOG_DISTRIBUTION_ID }}' --paths '/*'
